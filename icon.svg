<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with safe zone for maskable -->
  <rect width="512" height="512" fill="#f4f1ea"/>

  <!-- Inner safe area: 80% (centered, 410x410) -->
  <g transform="translate(51 51)">
    <!-- Black border block -->
    <rect x="0" y="0" width="410" height="410" fill="#1a1a1a"/>
    <rect x="12" y="12" width="386" height="386" fill="#f4f1ea"/>

    <!-- HUB text -->
    <text x="205" y="155" font-family="Georgia, serif" font-weight="800"
          font-size="92" text-anchor="middle" fill="#1a1a1a"
          letter-spacing="-2">HUB3</text>

    <!-- Big arrow in accent color -->
    <g transform="translate(205 215)">
      <path d="M -75 0 L 55 0 M 25 -30 L 55 0 L 25 30"
            stroke="#d63816" stroke-width="18"
            stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    </g>

    <!-- EPC text -->
    <text x="205" y="320" font-family="Georgia, serif" font-weight="800"
          font-size="92" text-anchor="middle" fill="#1a1a1a"
          letter-spacing="-2">EPC</text>

    <!-- Tiny QR-like dots at bottom -->
    <g fill="#1a1a1a">
      <rect x="100" y="350" width="14" height="14"/>
      <rect x="120" y="350" width="14" height="14"/>
      <rect x="160" y="350" width="14" height="14"/>
      <rect x="200" y="350" width="14" height="14"/>
      <rect x="220" y="350" width="14" height="14"/>
      <rect x="260" y="350" width="14" height="14"/>
      <rect x="296" y="350" width="14" height="14"/>
    </g>
  </g>
</svg>
